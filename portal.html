<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Plaza Portal | Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e94560;
            --secondary: #0f3460;
            --dark: #1a1a2e;
            --darker: #16213e;
            --light: #eaeaea;
            --accent: #00d9ff;
            --gold: #ffd700;
            --whatsapp: #25D366;
            --instagram: #E4405F;
            --glow: rgba(233, 69, 96, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--dark);
            min-height: 100vh;
            color: var(--light);
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 80%, rgba(233, 69, 96, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 215, 0, 0.05) 0%, transparent 30%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(30px, -30px) rotate(120deg);
            }

            66% {
                transform: translate(-20px, 20px) rotate(240deg);
            }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Main Container */
        .container {
            max-width: 430px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .back-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--glow);
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px var(--glow);
            animation: logoGlow 2s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            from {
                box-shadow: 0 0 15px var(--glow);
            }

            to {
                box-shadow: 0 0 35px var(--glow);
            }
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Contact Section */
        .contact-section {
            margin-top: 40px;
        }

        .section-title {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.8);
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
        }

        .contact-card:hover::before {
            left: 100%;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .whatsapp-card {
            border-color: rgba(37, 211, 102, 0.3);
        }

        .whatsapp-card:hover {
            border-color: var(--whatsapp);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3);
        }

        .instagram-card {
            border-color: rgba(228, 64, 95, 0.3);
        }

        .instagram-card:hover {
            border-color: var(--instagram);
            box-shadow: 0 15px 30px rgba(228, 64, 95, 0.3);
        }

        .contact-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
            position: relative;
        }

        .whatsapp-icon {
            background: var(--whatsapp);
            color: white;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
        }

        .instagram-icon {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
            box-shadow: 0 0 20px rgba(228, 64, 95, 0.4);
        }

        .contact-info {
            flex: 1;
        }

        .contact-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--light);
        }

        .contact-desc {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .contact-arrow {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .contact-card:hover .contact-arrow {
            transform: translateX(5px);
            color: var(--light);
        }

        /* Glowing Border Animation */
        @keyframes borderGlow {

            0%,
            100% {
                box-shadow: 0 0 5px currentColor;
            }

            50% {
                box-shadow: 0 0 20px currentColor;
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 0 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
        }

        .footer i {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Back Button -->
        <a href="public.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>

        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <img src="cache/logo.png" alt="Plaza Steel & Crockery" class="logo" onerror="this.style.display='none'">
            </div>
            <h1 class="title">Plaza Portal</h1>
            <p class="subtitle">PLAZA STEEL & CROCKERY</p>
        </header>

        <!-- Contact Section -->
        <div class="contact-section">
            <h2 class="section-title">Get In Touch</h2>

            <!-- WhatsApp -->
            <a href="https://wa.me/message/AEITVKONJBS3N1" class="contact-card whatsapp-card" target="_blank">
                <div class="contact-icon whatsapp-icon">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <div class="contact-info">
                    <div class="contact-title">WhatsApp</div>
                    <div class="contact-desc">Click to chat with us</div>
                </div>
                <div class="contact-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/plaza.steel?igsh=MTVnbDI0d3o2M2hoYw%3D%3D&utm_source=qr"
                class="contact-card instagram-card" target="_blank">
                <div class="contact-icon instagram-icon">
                    <i class="fab fa-instagram"></i>
                </div>
                <div class="contact-info">
                    <div class="contact-title">Instagram</div>
                    <div class="contact-desc">Follow us for updates</div>
                </div>
                <div class="contact-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>

            <!-- Admin Portal Link -->
            <a href="admin.html" class="contact-card" style="margin-top: 15px; border-color: rgba(0, 217, 255, 0.3);">
                <div class="contact-icon" style="background: linear-gradient(135deg, #0f3460, #00d9ff); color: white;">
                    <i class="fas fa-user-cog"></i>
                </div>
                <div class="contact-info">
                    <div class="contact-title">Admin Portal</div>
                    <div class="contact-desc">Manage inventory & reports</div>
                </div>
                <div class="contact-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p><i class="fas fa-heart"></i> Plaza Steel & Crockery</p>
            <p>Your Trusted Partner</p>
        </footer>
    </div>

    <script>
        // Create Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
        });
    </script>
</body>

</html>
