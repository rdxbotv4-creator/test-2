<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a2a6c">
    <title>Admin Dashboard | Plaza Rate List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary-dark: #0a0f2a;
            --accent-gold: #FFD700;
            --glass-white: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --success: #00c853;
            --warning: #ff9100;
            --danger: #ff1744;
            --info: #00b0ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: var(--text-white);
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Main Container */
        .container {
            max-width: 430px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Header */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        .dash-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .dash-title span {
            color: var(--accent-gold);
        }

        .logout-btn {
            padding: 8px 16px;
            background: var(--danger);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            padding: 15px 10px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .stat-card i {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .stat-card.total i {
            color: var(--accent-gold);
        }

        .stat-card.in-stock i {
            color: var(--success);
        }

        .stat-card.out-stock i {
            color: var(--danger);
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-white);
        }

        .stat-label {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .nav-tab {
            flex: 1;
            padding: 14px;
            background: var(--glass-white);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--accent-gold), #ffaa00);
            border-color: var(--accent-gold);
            color: var(--primary-dark);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .nav-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Content Sections */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Search Bar */
        .inv-search {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            color: var(--text-white);
            font-size: 0.9rem;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .inv-search:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .inv-search::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Filter Buttons */
        .filter-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 14px;
            background: var(--glass-white);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: var(--text-white);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--primary-dark);
            font-weight: 600;
        }

        .filter-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Add New Button */
        .add-new-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 2px dashed var(--accent-gold);
            border-radius: 12px;
            color: var(--accent-gold);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .add-new-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateY(-2px);
        }

        /* Inventory Item */
        .inv-item {
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
        }

        .inv-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .inv-item-name {
            font-size: 0.9rem;
            font-weight: 500;
            flex: 1;
            padding-right: 10px;
            line-height: 1.4;
        }

        .status-toggle {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .status-toggle.online {
            background: rgba(0, 200, 83, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-toggle.offline {
            background: rgba(255, 23, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .inv-item-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .inv-detail {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .inv-detail label {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.65rem;
            margin-bottom: 5px;
        }

        .inv-detail input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-white);
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
        }

        .inv-detail input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        .inv-actions {
            display: flex;
            gap: 8px;
        }

        .inv-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn {
            background: var(--success);
            color: white;
        }

        .delete-btn {
            background: var(--danger);
            color: white;
        }

        .inv-btn:hover {
            transform: scale(1.02);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--primary-dark);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            border: 1px solid var(--glass-border);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            color: var(--accent-gold);
        }

        .modal-form .form-group {
            margin-bottom: 15px;
        }

        .modal-form label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .modal-form input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            background: var(--glass-white);
            color: var(--text-white);
            font-size: 0.9rem;
        }

        .modal-form input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-white);
        }

        .submit-btn {
            background: var(--accent-gold);
            color: var(--primary-dark);
        }

        /* Report Section */
        .summary-card {
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .summary-title {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .summary-count {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .summary-card.negative .summary-count {
            color: var(--danger);
            animation: blink 1s infinite;
        }

        .summary-card.low .summary-count {
            color: var(--warning);
        }

        .summary-card.active .summary-count {
            color: var(--success);
        }

        .summary-card.zero .summary-count {
            color: #888;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .badge-negative {
            background: rgba(255, 23, 68, 0.2);
            color: var(--danger);
        }

        .badge-low {
            background: rgba(255, 145, 0, 0.2);
            color: var(--warning);
        }

        .badge-active {
            background: rgba(0, 200, 83, 0.2);
            color: var(--success);
        }

        .badge-zero {
            background: rgba(136, 136, 136, 0.2);
            color: #888;
        }

        .report-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .report-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }

        .report-item-name {
            flex: 1;
            padding-right: 10px;
        }

        .report-item-qty {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .report-item-qty.negative {
            color: var(--danger);
        }

        .report-item-qty.low {
            color: var(--warning);
        }

        /* Download Button */
        .download-btn-report {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--success), #00a844);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3);
        }

        .download-btn-report:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 200, 83, 0.5);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-dark);
            color: var(--text-white);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            border-left: 4px solid var(--success);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="dash-header">
            <div>
                <div class="dash-title"><i class="fas fa-chart-bar"></i> Dashboard</div>
                <div style="font-size: 0.7rem; color: rgba(255,255,255,0.6);">Plaza Steel & Crockery</div>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card total">
                <i class="fas fa-boxes"></i>
                <div class="stat-value" id="totalItems">0</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat-card in-stock">
                <i class="fas fa-check-circle"></i>
                <div class="stat-value" id="inStock">0</div>
                <div class="stat-label">In Stock</div>
            </div>
            <div class="stat-card out-stock">
                <i class="fas fa-times-circle"></i>
                <div class="stat-value" id="outStock">0</div>
                <div class="stat-label">Out of Stock</div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="showSection('inventory')">
                <i class="fas fa-box"></i> Inventory
            </div>
            <div class="nav-tab" onclick="showSection('report')">
                <i class="fas fa-chart-pie"></i> Report
            </div>
        </div>

        <!-- Inventory Section -->
        <div class="content-section active" id="inventorySection">
            <button class="add-new-btn" onclick="showAddModal()">
                <i class="fas fa-plus-circle"></i> Add New Item
            </button>

            <input type="text" class="inv-search" id="invSearch" placeholder="🔍 Search inventory...">

            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterInventory('all')">All</button>
                <button class="filter-btn" onclick="filterInventory('online')">Online</button>
                <button class="filter-btn" onclick="filterInventory('offline')">Offline</button>
                <button class="filter-btn" onclick="filterInventory('low')">Low (1-9)</button>
                <button class="filter-btn" onclick="filterInventory('negative')">Negative</button>
            </div>

            <div id="inventoryList"></div>
        </div>

        <!-- Report Section -->
        <div class="content-section" id="reportSection">
            <!-- Negative Stock -->
            <div class="summary-card negative">
                <div class="summary-header">
                    <span class="summary-title">🔴 NEGATIVE STOCK</span>
                    <span class="summary-count" id="negativeCount">0</span>
                </div>
                <div class="report-list" id="negativeList"></div>
            </div>

            <!-- Low Stock -->
            <div class="summary-card low">
                <div class="summary-header">
                    <span class="summary-title">🟠 LOW STOCK (1-9)</span>
                    <span class="summary-count" id="lowCount">0</span>
                </div>
                <div class="report-list" id="lowList"></div>
            </div>

            <!-- Zero Stock -->
            <div class="summary-card zero">
                <div class="summary-header">
                    <span class="summary-title">⚫ OUT OF STOCK (0)</span>
                    <span class="summary-count" id="zeroCount">0</span>
                </div>
                <div class="report-list" id="zeroList"></div>
            </div>

            <!-- Active Stock -->
            <div class="summary-card active">
                <div class="summary-header">
                    <span class="summary-title">🟢 ACTIVE STOCK (10+)</span>
                    <span class="summary-count" id="activeCount">0</span>
                </div>
                <div class="report-list" id="activeList"></div>
            </div>

            <button class="download-btn-report" onclick="downloadPDF()">
                <i class="fas fa-file-pdf"></i> Download PDF Report
            </button>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="itemModal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">Add New Item</h3>
            <form class="modal-form" id="itemForm">
                <div class="form-group">
                    <label>Item Description</label>
                    <input type="text" id="itemDescription" placeholder="Enter item name" required>
                </div>
                <div class="form-group">
                    <label>Cost Price</label>
                    <input type="number" id="itemCost" placeholder="0" min="0" required>
                </div>
                <div class="form-group">
                    <label>Sale Price</label>
                    <input type="number" id="itemPrice" placeholder="0" min="0" required>
                </div>
                <div class="form-group">
                    <label>Quantity in Hand</label>
                    <input type="number" id="itemQty" placeholder="0" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn cancel-btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="modal-btn submit-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Data Storage
        let products = [];
        let editingIndex = -1;
        let currentFilter = 'all';

        // Check Session
        function checkSession() {
            const sessionTime = sessionStorage.getItem('adminSession');
            if (!sessionTime) {
                window.location.href = 'admin-login.html';
                return false;
            }

            // Check if session expired (30 min)
            if (Date.now() - sessionTime > 30 * 60 * 1000) {
                sessionStorage.removeItem('adminSession');
                window.location.href = 'admin-login.html';
                return false;
            }

            return true;
        }

        // Load Products
        async function loadProducts() {
            try {
                // Load from the main inventory file
                const response = await fetch('../list/iteam list.json');
                const data = await response.json();

                // Handle the nested "Table 1" structure
                let rawProducts = Array.isArray(data) ? data : (data['Table 1'] || []);

                // Load from localStorage if available and has data
                const savedProducts = localStorage.getItem('plazaProducts');
                let storedProducts = savedProducts ? JSON.parse(savedProducts) : [];

                // If localStorage is empty or has no products, reload from file
                if (!storedProducts || storedProducts.length === 0) {
                    // Convert old format to new format
                    products = rawProducts.map((item, index) => ({
                        id: item.id || 'item-' + (index + 1),
                        description: item['Item Description'] || item.description || '',
                        cost: item.Cost || item.cost || 0,
                        price: item.Price || item.price || 0,
                        qty: item['Qty OH'] || item.qty || 0,
                        status: true
                    }));
                    saveToLocalStorage();
                } else {
                    products = storedProducts;
                }

                updateStats();
                renderInventory();
                renderReport();
                console.log('Loaded products:', products.length);
            } catch (error) {
                console.error('Error loading products:', error);
                showToast('Error loading products', true);
            }
        }

        // Save to LocalStorage
        function saveToLocalStorage() {
            localStorage.setItem('plazaProducts', JSON.stringify(products));
        }

        // Update Stats
        function updateStats() {
            const total = products.length;
            const inStock = products.filter(p => p.qty > 0).length;
            const outStock = products.filter(p => p.qty <= 0).length;

            // Animate counters
            animateCounter('totalItems', total);
            animateCounter('inStock', inStock);
            animateCounter('outStock', outStock);
        }

        function animateCounter(elementId, target) {
            const element = document.getElementById(elementId);
            let current = 0;
            const increment = target / 20;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = Math.round(current);
            }, 30);
        }

        // Show Section
        function showSection(section) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));

            if (section === 'inventory') {
                document.querySelectorAll('.nav-tab')[0].classList.add('active');
                document.getElementById('inventorySection').classList.add('active');
            } else {
                document.querySelectorAll('.nav-tab')[1].classList.add('active');
                document.getElementById('reportSection').classList.add('active');
                renderReport();
            }
        }

        // Filter Inventory
        function filterInventory(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderInventory();
        }

        // Render Inventory
        function renderInventory() {
            const searchTerm = document.getElementById('invSearch').value.toLowerCase();

            let filtered = products.filter(p => {
                const matchesSearch = p.description.toLowerCase().includes(searchTerm);

                switch (currentFilter) {
                    case 'online': return matchesSearch && p.status;
                    case 'offline': return matchesSearch && !p.status;
                    case 'low': return matchesSearch && p.qty > 0 && p.qty <= 9;
                    case 'negative': return matchesSearch && p.qty < 0;
                    default: return matchesSearch;
                }
            });

            const inventoryList = document.getElementById('inventoryList');

            if (filtered.length === 0) {
                inventoryList.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">
                        <i class="fas fa-box-open" style="font-size: 2rem; margin-bottom: 10px;"></i>
                        <p>No items found</p>
                    </div>
                `;
                return;
            }

            inventoryList.innerHTML = filtered.map((product, index) => {
                const originalIndex = products.indexOf(product);
                return `
                    <div class="inv-item">
                        <div class="inv-item-header">
                            <div class="inv-item-name">${escapeHtml(product.description)}</div>
                            <button class="status-toggle ${product.status ? 'online' : 'offline'}" 
                                onclick="toggleStatus(${originalIndex})">
                                ${product.status ? 'ONLINE' : 'OFFLINE'}
                            </button>
                        </div>
                        <div class="inv-item-details">
                            <div class="inv-detail">
                                <label>Cost</label>
                                <input type="number" value="${product.cost}" 
                                    onchange="updateField(${originalIndex}, 'cost', this.value)">
                            </div>
                            <div class="inv-detail">
                                <label>Price</label>
                                <input type="number" value="${product.price}" 
                                    onchange="updateField(${originalIndex}, 'price', this.value)">
                            </div>
                            <div class="inv-detail">
                                <label>Qty OH</label>
                                <input type="number" value="${product.qty}" 
                                    onchange="updateField(${originalIndex}, 'qty', this.value)"
                                    style="color: ${product.qty < 0 ? 'var(--danger)' : product.qty <= 9 ? 'var(--warning)' : 'var(--text-white)'}">
                            </div>
                        </div>
                        <div class="inv-actions">
                            <button class="inv-btn save-btn" onclick="editItem(${originalIndex})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="inv-btn delete-btn" onclick="deleteItem(${originalIndex})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Toggle Status
        function toggleStatus(index) {
            products[index].status = !products[index].status;
            saveToLocalStorage();
            renderInventory();
            updateStats();
            showToast(`Item ${products[index].status ? 'activated' : 'deactivated'}`);
        }

        // Update Field
        function updateField(index, field, value) {
            products[index][field] = parseFloat(value) || 0;
            saveToLocalStorage();
            updateStats();
        }

        // Edit Item
        function editItem(index) {
            editingIndex = index;
            const product = products[index];

            document.getElementById('modalTitle').textContent = 'Edit Item';
            document.getElementById('itemDescription').value = product.description;
            document.getElementById('itemCost').value = product.cost;
            document.getElementById('itemPrice').value = product.price;
            document.getElementById('itemQty').value = product.qty;

            document.getElementById('itemModal').classList.add('show');
        }

        // Delete Item
        function deleteItem(index) {
            if (confirm('Are you sure you want to delete this item?')) {
                products.splice(index, 1);
                saveToLocalStorage();
                renderInventory();
                updateStats();
                showToast('Item deleted successfully');
            }
        }

        // Show Add Modal
        function showAddModal() {
            editingIndex = -1;
            document.getElementById('modalTitle').textContent = 'Add New Item';
            document.getElementById('itemForm').reset();
            document.getElementById('itemModal').classList.add('show');
        }

        // Close Modal
        function closeModal() {
            document.getElementById('itemModal').classList.remove('show');
            editingIndex = -1;
        }

        // Save Item
        document.getElementById('itemForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const newItem = {
                id: 'item-' + Math.random().toString(36).substr(2, 9),
                description: document.getElementById('itemDescription').value,
                cost: parseFloat(document.getElementById('itemCost').value) || 0,
                price: parseFloat(document.getElementById('itemPrice').value) || 0,
                qty: parseFloat(document.getElementById('itemQty').value) || 0,
                status: true
            };

            if (editingIndex >= 0) {
                products[editingIndex] = newItem;
                showToast('Item updated successfully');
            } else {
                products.push(newItem);
                showToast('Item added successfully');
            }

            saveToLocalStorage();
            closeModal();
            renderInventory();
            updateStats();
        });

        // Render Report
        function renderReport() {
            const negative = products.filter(p => p.qty < 0);
            const low = products.filter(p => p.qty > 0 && p.qty <= 9);
            const zero = products.filter(p => p.qty === 0);
            const active = products.filter(p => p.qty >= 10);

            document.getElementById('negativeCount').textContent = negative.length;
            document.getElementById('lowCount').textContent = low.length;
            document.getElementById('zeroCount').textContent = zero.length;
            document.getElementById('activeCount').textContent = active.length;

            // Negative List
            document.getElementById('negativeList').innerHTML = negative.length ?
                negative.map(p => `
                    <div class="report-item">
                        <span class="report-item-name">${escapeHtml(p.description.substring(0, 25))}</span>
                        <span class="report-item-qty negative">${p.qty}</span>
                    </div>
                `).join('') : '<p style="padding:10px;color:rgba(255,255,255,0.5);text-align:center">No items</p>';

            // Low Stock List
            document.getElementById('lowList').innerHTML = low.length ?
                low.map(p => `
                    <div class="report-item">
                        <span class="report-item-name">${escapeHtml(p.description.substring(0, 25))}</span>
                        <span class="report-item-qty low">${p.qty}</span>
                    </div>
                `).join('') : '<p style="padding:10px;color:rgba(255,255,255,0.5);text-align:center">No items</p>';

            // Zero Stock List
            document.getElementById('zeroList').innerHTML = zero.length ?
                zero.map(p => `
                    <div class="report-item">
                        <span class="report-item-name">${escapeHtml(p.description.substring(0, 25))}</span>
                        <span class="report-item-qty">0</span>
                    </div>
                `).join('') : '<p style="padding:10px;color:rgba(255,255,255,0.5);text-align:center">No items</p>';

            // Active Stock List
            document.getElementById('activeList').innerHTML = active.length ?
                active.slice(0, 10).map(p => `
                    <div class="report-item">
                        <span class="report-item-name">${escapeHtml(p.description.substring(0, 25))}</span>
                        <span class="report-item-qty" style="color:var(--success)">${p.qty}</span>
                    </div>
                `).join('') + (active.length > 10 ? `<p style="padding:10px;color:rgba(255,255,255,0.5);text-align:center">+${active.length - 10} more</p>` : '') : '<p style="padding:10px;color:rgba(255,255,255,0.5);text-align:center">No items</p>';
        }

        // Download PDF - Complete JO Report with ALL Stock Details
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageHeight = doc.internal.pageSize.height;
            const pageWidth = doc.internal.pageSize.width;
            const margin = 14;
            let y = 20;

            // Helper to check and add new page
            function checkNewPage(neededHeight) {
                if (y + neededHeight > pageHeight - 20) {
                    doc.addPage();
                    y = 20;
                    return true;
                }
                return false;
            }

            // Header
            doc.setFontSize(20);
            doc.setTextColor(26, 42, 108);
            doc.text('PLAZA STEEL & CROCKERY', pageWidth / 2, y, { align: 'center' });

            y += 10;
            doc.setFontSize(14);
            doc.setTextColor(0, 0, 0);
            doc.text('JOB ORDER (JO) REPORT - COMPLETE STOCK DETAILS', pageWidth / 2, y, { align: 'center' });

            y += 8;
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text(`Date: ${new Date().toLocaleDateString()} | Time: ${new Date().toLocaleTimeString()}`, pageWidth / 2, y, { align: 'center' });

            y += 12;

            // Overall Stats Summary
            const totalItems = products.length;
            const inStock = products.filter(p => p.qty > 0).length;
            const outStock = products.filter(p => p.qty <= 0).length;
            const negative = products.filter(p => p.qty < 0);
            const low = products.filter(p => p.qty > 0 && p.qty <= 9);
            const zero = products.filter(p => p.qty === 0);
            const active = products.filter(p => p.qty >= 10);
            const totalValue = products.reduce((sum, p) => sum + (p.qty * p.cost), 0);
            const totalSaleValue = products.reduce((sum, p) => sum + (p.qty * p.price), 0);

            // Summary Box
            doc.setFillColor(240, 240, 250);
            doc.rect(margin - 5, y - 5, pageWidth - 2 * margin + 10, 28, 'F');
            doc.setDrawColor(200, 200, 220);
            doc.rect(margin - 5, y - 5, pageWidth - 2 * margin + 10, 28, 'S');

            doc.setFontSize(11);
            doc.setTextColor(0, 0, 0);
            doc.text('SUMMARY', margin, y + 2);

            doc.setFontSize(9);
            doc.text(`Total Items: ${totalItems}`, margin, y + 10);
            doc.text(`In Stock: ${inStock}`, margin + 45, y + 10);
            doc.text(`Out of Stock: ${outStock}`, margin + 90, y + 10);
            doc.text(`Negative Stock: ${negative.length}`, margin, y + 17);
            doc.text(`Low Stock: ${low.length}`, margin + 45, y + 17);
            doc.text(`Active Stock: ${active.length}`, margin + 90, y + 17);

            y += 35;

            // ========================================
            // NEGATIVE STOCK SECTION (All Items)
            // ========================================
            checkNewPage(30);

            doc.setFontSize(14);
            doc.setTextColor(255, 0, 0);
            doc.setFillColor(255, 230, 230);
            doc.rect(margin - 3, y - 5, pageWidth - 2 * margin + 6, 10, 'F');
            doc.text(`🔴 NEGATIVE STOCK ITEMS (${negative.length})`, margin, y + 2);

            y += 12;

            if (negative.length > 0) {
                // Table Header
                doc.setFillColor(200, 0, 0);
                doc.rect(margin, y - 4, pageWidth - 2 * margin, 8, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(9);
                doc.text('#', margin + 2, y);
                doc.text('Item Description', margin + 10, y);
                doc.text('Cost', margin + 95, y);
                doc.text('Price', margin + 115, y);
                doc.text('Qty', margin + 135, y);
                doc.text('Total Value', margin + 150, y);

                y += 8;
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(8);

                negative.forEach((p, i) => {
                    checkNewPage(10);
                    const totalVal = (p.qty * p.cost).toFixed(0);
                    const rowColor = (i % 2 === 0) ? [255, 245, 245] : [255, 255, 255];
                    doc.setFillColor(...rowColor);
                    doc.rect(margin, y - 3, pageWidth - 2 * margin, 7, 'F');

                    doc.text(String(i + 1), margin + 2, y);
                    doc.text(truncateText(p.description, 35), margin + 10, y);
                    doc.text(p.cost.toString(), margin + 95, y);
                    doc.text(p.price.toString(), margin + 115, y);
                    doc.text(p.qty.toString(), margin + 135, y);
                    doc.text(totalVal, margin + 150, y);
                    y += 7;
                });
            } else {
                doc.setFontSize(10);
                doc.setTextColor(100, 100, 100);
                doc.text('No negative stock items', margin, y);
                y += 10;
            }

            y += 10;

            // ========================================
            // LOW STOCK SECTION (1-9) - All Items
            // ========================================
            checkNewPage(30);

            doc.setFontSize(14);
            doc.setTextColor(255, 145, 0);
            doc.setFillColor(255, 245, 230);
            doc.rect(margin - 3, y - 5, pageWidth - 2 * margin + 6, 10, 'F');
            doc.text(`🟠 LOW STOCK ITEMS (1-9) - ${low.length} Items`, margin, y + 2);

            y += 12;

            if (low.length > 0) {
                // Table Header
                doc.setFillColor(255, 180, 0);
                doc.rect(margin, y - 4, pageWidth - 2 * margin, 8, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(9);
                doc.text('#', margin + 2, y);
                doc.text('Item Description', margin + 10, y);
                doc.text('Cost', margin + 95, y);
                doc.text('Price', margin + 115, y);
                doc.text('Qty', margin + 135, y);
                doc.text('Total Value', margin + 150, y);

                y += 8;
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(8);

                low.forEach((p, i) => {
                    checkNewPage(10);
                    const totalVal = (p.qty * p.cost).toFixed(0);
                    const rowColor = (i % 2 === 0) ? [255, 250, 240] : [255, 255, 255];
                    doc.setFillColor(...rowColor);
                    doc.rect(margin, y - 3, pageWidth - 2 * margin, 7, 'F');

                    doc.text(String(i + 1), margin + 2, y);
                    doc.text(truncateText(p.description, 35), margin + 10, y);
                    doc.text(p.cost.toString(), margin + 95, y);
                    doc.text(p.price.toString(), margin + 115, y);
                    doc.text(p.qty.toString(), margin + 135, y);
                    doc.text(totalVal, margin + 150, y);
                    y += 7;
                });
            } else {
                doc.setFontSize(10);
                doc.setTextColor(100, 100, 100);
                doc.text('No low stock items', margin, y);
                y += 10;
            }

            y += 10;

            // ========================================
            // OUT OF STOCK SECTION (0) - All Items
            // ========================================
            checkNewPage(30);

            doc.setFontSize(14);
            doc.setTextColor(100, 100, 100);
            doc.setFillColor(240, 240, 240);
            doc.rect(margin - 3, y - 5, pageWidth - 2 * margin + 6, 10, 'F');
            doc.text(`⚫ OUT OF STOCK ITEMS (0) - ${zero.length} Items`, margin, y + 2);

            y += 12;

            if (zero.length > 0) {
                // Table Header
                doc.setFillColor(150, 150, 150);
                doc.rect(margin, y - 4, pageWidth - 2 * margin, 8, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(9);
                doc.text('#', margin + 2, y);
                doc.text('Item Description', margin + 10, y);
                doc.text('Cost', margin + 95, y);
                doc.text('Price', margin + 115, y);
                doc.text('Qty', margin + 135, y);
                doc.text('Status', margin + 150, y);

                y += 8;
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(8);

                zero.forEach((p, i) => {
                    checkNewPage(10);
                    const rowColor = (i % 2 === 0) ? [245, 245, 245] : [255, 255, 255];
                    doc.setFillColor(...rowColor);
                    doc.rect(margin, y - 3, pageWidth - 2 * margin, 7, 'F');

                    doc.text(String(i + 1), margin + 2, y);
                    doc.text(truncateText(p.description, 35), margin + 10, y);
                    doc.text(p.cost.toString(), margin + 95, y);
                    doc.text(p.price.toString(), margin + 115, y);
                    doc.text('0', margin + 135, y);
                    doc.text(p.status ? 'Active' : 'Offline', margin + 150, y);
                    y += 7;
                });
            } else {
                doc.setFontSize(10);
                doc.setTextColor(100, 100, 100);
                doc.text('No out of stock items', margin, y);
                y += 10;
            }

            y += 10;

            // ========================================
            // ACTIVE STOCK SECTION (10+) - ALL ITEMS
            // ========================================
            checkNewPage(30);

            doc.setFontSize(14);
            doc.setTextColor(0, 150, 50);
            doc.setFillColor(230, 250, 230);
            doc.rect(margin - 3, y - 5, pageWidth - 2 * margin + 6, 10, 'F');
            doc.text(`🟢 ACTIVE STOCK ITEMS (10+) - ${active.length} Items`, margin, y + 2);

            y += 12;

            if (active.length > 0) {
                // Table Header
                doc.setFillColor(0, 150, 50);
                doc.rect(margin, y - 4, pageWidth - 2 * margin, 8, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(9);
                doc.text('#', margin + 2, y);
                doc.text('Item Description', margin + 10, y);
                doc.text('Cost', margin + 95, y);
                doc.text('Price', margin + 115, y);
                doc.text('Qty', margin + 135, y);
                doc.text('Total Value', margin + 150, y);

                y += 8;
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(8);

                active.forEach((p, i) => {
                    checkNewPage(10);
                    const totalVal = (p.qty * p.cost).toFixed(0);
                    const rowColor = (i % 2 === 0) ? [240, 255, 240] : [255, 255, 255];
                    doc.setFillColor(...rowColor);
                    doc.rect(margin, y - 3, pageWidth - 2 * margin, 7, 'F');

                    doc.text(String(i + 1), margin + 2, y);
                    doc.text(truncateText(p.description, 35), margin + 10, y);
                    doc.text(p.cost.toString(), margin + 95, y);
                    doc.text(p.price.toString(), margin + 115, y);
                    doc.text(p.qty.toString(), margin + 135, y);
                    doc.text(totalVal, margin + 150, y);
                    y += 7;
                });
            } else {
                doc.setFontSize(10);
                doc.setTextColor(100, 100, 100);
                doc.text('No active stock items', margin, y);
                y += 10;
            }

            y += 15;

            // ========================================
            // COMPLETE ALL ITEMS SUMMARY
            // ========================================
            checkNewPage(40);

            doc.setFontSize(14);
            doc.setTextColor(26, 42, 108);
            doc.setFillColor(230, 235, 250);
            doc.rect(margin - 3, y - 5, pageWidth - 2 * margin + 6, 10, 'F');
            doc.text(`📋 COMPLETE STOCK LIST - ALL ${products.length} ITEMS`, margin, y + 2);

            y += 12;

            // Table Header
            doc.setFillColor(26, 42, 108);
            doc.rect(margin, y - 4, pageWidth - 2 * margin, 8, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(9);
            doc.text('#', margin + 2, y);
            doc.text('Item Description', margin + 10, y);
            doc.text('Cost', margin + 95, y);
            doc.text('Price', margin + 115, y);
            doc.text('Qty', margin + 135, y);
            doc.text('Total', margin + 150, y);

            y += 8;
            doc.setFontSize(8);

            // ALL Products - Complete List
            products.forEach((p, i) => {
                checkNewPage(10);
                const totalVal = (p.qty * p.cost).toFixed(0);
                let rowColor;

                if (p.qty < 0) {
                    rowColor = [255, 230, 230];
                } else if (p.qty === 0) {
                    rowColor = [245, 245, 245];
                } else if (p.qty <= 9) {
                    rowColor = [255, 250, 240];
                } else {
                    rowColor = (i % 2 === 0) ? [240, 255, 240] : [255, 255, 255];
                }

                doc.setFillColor(...rowColor);
                doc.rect(margin, y - 3, pageWidth - 2 * margin, 7, 'F');

                doc.setTextColor(0, 0, 0);
                doc.text(String(i + 1), margin + 2, y);
                doc.text(truncateText(p.description, 35), margin + 10, y);
                doc.text(p.cost.toString(), margin + 95, y);
                doc.text(p.price.toString(), margin + 115, y);
                doc.text(p.qty.toString(), margin + 135, y);
                doc.text(totalVal, margin + 150, y);
                y += 7;
            });

            y += 10;

            // ========================================
            // GRAND TOTAL SUMMARY
            // ========================================
            checkNewPage(25);

            doc.setFillColor(240, 240, 250);
            doc.rect(margin - 3, y - 5, pageWidth - 2 * margin + 6, 22, 'F');
            doc.setDrawColor(100, 100, 150);
            doc.rect(margin - 3, y - 5, pageWidth - 2 * margin + 6, 22, 'S');

            doc.setFontSize(12);
            doc.setTextColor(26, 42, 108);
            doc.text('GRAND TOTAL SUMMARY', margin, y + 2);

            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            doc.text(`Total Items: ${totalItems}`, margin, y + 10);
            doc.text(`Total Stock Value (Cost): Rs. ${totalValue.toLocaleString()}`, margin + 60, y + 10);
            doc.text(`Total Sale Value: Rs. ${totalSaleValue.toLocaleString()}`, margin, y + 16);

            // Footer on last page
            doc.setFontSize(8);
            doc.setTextColor(150, 150, 150);
            doc.text('Generated by Plaza Rate List App | JO Report - Complete Stock Details', pageWidth / 2, pageHeight - 10, { align: 'center' });

            // Save the PDF
            const dateStr = new Date().toISOString().slice(0, 10);
            doc.save(`JO_Report_${dateStr}_Complete_Stock.pdf`);

            showToast('✅ Complete JO Report PDF downloaded with all ' + totalItems + ' items!');
        }

        // Helper: Truncate text
        function truncateText(text, maxLen) {
            return text.length > maxLen ? text.substring(0, maxLen) + '...' : text;
        }

        // Logout
        function logout() {
            sessionStorage.removeItem('adminSession');
            window.location.href = 'admin-login.html';
        }

        // Search Event
        document.getElementById('invSearch').addEventListener('input', renderInventory);

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Show Toast
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (checkSession()) {
                loadProducts();
            }
        });
    </script>
</body>

</html>
