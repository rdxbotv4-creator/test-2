<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a2a6c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Official rate list of Plaza Steel & Crockery">
    <title>Plaza Rate List</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="../cache/app icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --primary-dark: #0a0f2a;
            --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            --accent-gold: #FFD700;
            --accent-steel: #708090;
            --glass-white: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --text-glow: 0 0 20px rgba(255, 215, 0, 0.5);
            --success: #00c853;
            --warning: #ff9100;
            --danger: #ff1744;
        }

        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--primary-dark);
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
            background: var(--primary-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ===== FLOATING PARTICLES ===== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--accent-gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle 20s infinite linear;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.4;
            }

            90% {
                opacity: 0.4;
            }

            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== MAIN CONTAINER (9:16 RATIO) ===== */
        .container {
            max-width: 430px;
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER SECTION ===== */
        .header {
            text-align: center;
            padding: 15px 0;
            flex-shrink: 0;
        }

        /* SPINNING LOGO */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }

        .logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4), inset 0 0 20px rgba(255, 215, 0, 0.2);
            animation: spinLogo 10s linear infinite, pulseLogo 2s ease-in-out infinite;
        }

        @keyframes spinLogo {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulseLogo {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.4), inset 0 0 20px rgba(255, 215, 0, 0.2);
            }

            50% {
                box-shadow: 0 0 50px rgba(255, 215, 0, 0.6), inset 0 0 30px rgba(255, 215, 0, 0.3);
            }
        }

        /* TYPEWRITER TITLE */
        .title {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--accent-gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% auto;
            animation: shimmerText 3s linear infinite;
            text-shadow: var(--text-glow);
            overflow: hidden;
            white-space: nowrap;
        }

        @keyframes shimmerText {
            to {
                background-position: 200% center;
            }
        }

        .subtitle {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        /* ===== SEARCH SECTION ===== */
        .search-section {
            flex-shrink: 0;
            margin-bottom: 15px;
        }

        .search-container {
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 16px 50px 16px 20px;
            border: 2px solid var(--glass-border);
            border-radius: 50px;
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            color: var(--text-white);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
            transform: scale(1.02);
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-gold);
            font-size: 1.2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translateY(-50%) scale(1);
            }

            50% {
                transform: translateY(-50%) scale(1.1);
            }
        }

        /* ===== PRODUCT BOX (50% SCREEN HEIGHT) ===== */
        .product-section {
            flex: 1;
            min-height: 0;
            margin-bottom: 15px;
        }

        .product-box {
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            height: 100%;
            max-height: 50vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .product-header {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .product-header h3 {
            font-size: 1rem;
            color: var(--accent-gold);
        }

        .item-count {
            background: var(--accent-gold);
            color: var(--primary-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* PRODUCT LIST (INTERNAL SCROLL) */
        .product-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* CUSTOM SCROLLBAR */
        .product-list::-webkit-scrollbar {
            width: 6px;
        }

        .product-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .product-list::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 3px;
        }

        /* PRODUCT CARD */
        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            animation: fadeInUp 0.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-gold);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2);
        }

        .product-name {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .product-name .highlight {
            background: rgba(255, 215, 0, 0.3);
            color: var(--accent-gold);
            padding: 0 3px;
            border-radius: 3px;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--success);
            text-shadow: 0 0 10px rgba(0, 200, 83, 0.3);
        }

        .price-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        /* NO RESULTS */
        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .no-results i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--warning);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        /* ===== DOWNLOAD BUTTONS ===== */
        .download-section {
            flex-shrink: 0;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            text-align: center;
        }

        .download-buttons {
            display: flex;
            gap: 10px;
        }

        .download-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .android-btn {
            background: linear-gradient(135deg, #3ddc84, #00a86b);
            color: white;
            box-shadow: 0 4px 15px rgba(61, 220, 132, 0.3);
            animation: pulseBtn 2s infinite;
        }

        .ios-btn {
            background: linear-gradient(135deg, #333, #000);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            animation: pulseBtn 2s infinite;
            animation-delay: 0.5s;
        }

        @keyframes pulseBtn {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }
        }

        .download-btn:hover {
            transform: translateY(-3px);
        }

        /* ===== SOCIAL LINKS ===== */
        .social-section {
            flex-shrink: 0;
            margin-bottom: 15px;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(37, 211, 102, 0.5);
        }

        .instagram-btn {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
            box-shadow: 0 4px 15px rgba(225, 48, 108, 0.3);
        }

        .instagram-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(225, 48, 108, 0.5);
        }

        /* ===== PLAZA PORTAL BUTTON ===== */
        .portal-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-white);
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .portal-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .portal-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .portal-btn:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transform: translateY(-2px);
        }

        /* ===== LOADING SPINNER ===== */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== TOAST NOTIFICATION ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-dark);
            color: var(--text-white);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            border-left: 4px solid var(--success);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ===== INSTALL PROMPT ===== */
        .install-prompt {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--primary-dark), transparent);
            padding: 20px;
            text-align: center;
            transform: translateY(100%);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .install-prompt.show {
            transform: translateY(0);
        }

        .install-btn {
            padding: 14px 30px;
            background: var(--accent-gold);
            color: var(--primary-dark);
            border: none;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
        }

        .install-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 15px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .footer i {
            color: var(--accent-gold);
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body>
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <img src="../cache/logo.png" alt="Plaza Steel & Crockery" class="logo"
                    onerror="this.style.display='none'">
            </div>
            <h1 class="title">Plaza Rate List</h1>
            <p class="subtitle">PLAZA STEEL & CROCKERY</p>
        </header>

        <!-- Search -->
        <div class="search-section">
            <div class="search-container">
                <input type="text" class="search-box" id="searchBox" placeholder="Search products...">
                <i class="fas fa-search search-icon"></i>
            </div>
        </div>

        <!-- Product Box (50% height) -->
        <div class="product-section">
            <div class="product-box">
                <div class="product-header">
                    <h3><i class="fas fa-box"></i> Products</h3>
                    <span class="item-count" id="itemCount">0</span>
                </div>
                <div class="product-list" id="productList">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Download Buttons -->
        <div class="download-section">
            <p class="section-title">📱 Install Our App</p>
            <div class="download-buttons">
                <a href="#" class="download-btn android-btn" onclick="installApp('android')">
                    <i class="fab fa-android"></i> Android
                </a>
                <a href="#" class="download-btn ios-btn" onclick="installApp('ios')">
                    <i class="fab fa-apple"></i> iOS
                </a>
            </div>
        </div>

        <!-- Social Links -->
        <div class="social-section">
            <div class="social-buttons">
                <a href="https://wa.me/message/AEITVKONJBS3N1" class="social-btn whatsapp-btn" target="_blank">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a href="https://www.instagram.com/plaza.steel?igsh=MTVnbDI0d3o2M2hoYw%3D%3D&utm_source=qr"
                    class="social-btn instagram-btn" target="_blank">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
            </div>
        </div>

        <!-- Plaza Portal -->
        <a href="portal.html" class="portal-btn">
            <i class="fas fa-external-link-alt"></i> Plaza Portal
        </a>

        <!-- Footer -->
        <footer class="footer">
            <p><i class="fas fa-heart"></i> Plaza Steel & Crockery</p>
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Install Prompt -->
    <div class="install-prompt" id="installPrompt">
        <button class="install-btn" onclick="promptInstall()">
            <i class="fas fa-download"></i> Install App
        </button>
    </div>

    <script>
        // ===== PRODUCT DATA =====
        let allProducts = [];
        let deferredPrompt;

        // ===== LOAD PRODUCTS =====
        async function loadProducts() {
            try {
                const response = await fetch('../data/items.json');
                const data = await response.json();

                // Also try loading from localStorage
                const savedProducts = localStorage.getItem('plazaProducts');
                if (savedProducts) {
                    allProducts = JSON.parse(savedProducts);
                } else {
                    allProducts = data.map(item => ({
                        id: item.id || 'item-' + Math.random().toString(36).substr(2, 9),
                        description: item['Item Description'] || item.description || '',
                        cost: item.Cost || item.cost || 0,
                        price: item.Price || item.price || 0,
                        qty: item['Qty OH'] || item.qty || 0,
                        status: item.Status !== 'offline'
                    }));
                    localStorage.setItem('plazaProducts', JSON.stringify(allProducts));
                }

                displayProducts(allProducts);
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productList').innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading products</p>
                    </div>
                `;
            }
        }

        // ===== DISPLAY PRODUCTS =====
        function displayProducts(products) {
            const productList = document.getElementById('productList');
            const itemCount = document.getElementById('itemCount');

            // Filter only online products
            const activeProducts = products.filter(p => p.status !== false);

            itemCount.textContent = activeProducts.length;

            if (activeProducts.length === 0) {
                productList.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <p>No products found</p>
                    </div>
                `;
                return;
            }

            productList.innerHTML = activeProducts.map((product, index) => `
                <div class="product-card" style="animation-delay: ${index * 0.05}s">
                    <div class="product-name">${escapeHtml(product.description)}</div>
                    <div class="product-price">
                        <span class="price-label">Rs. </span>${formatNumber(product.price)}
                    </div>
                </div>
            `).join('');
        }

        // ===== SEARCH FUNCTION =====
        function searchProducts(query) {
            if (!query.trim()) {
                displayProducts(allProducts);
                return;
            }

            const searchTerms = query.toLowerCase().split(' ').filter(t => t.length > 0);

            const filtered = allProducts.filter(product => {
                const desc = product.description.toLowerCase();
                return searchTerms.every(term => desc.includes(term));
            });

            displayProducts(filtered);
        }

        // ===== UTILITY FUNCTIONS =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // ===== CREATE PARTICLES =====
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 15) + 's';
                container.appendChild(particle);
            }
        }

        // ===== INSTALL APP =====
        function installApp(platform) {
            if (platform === 'android') {
                showToast('For Android: Use "Add to Home Screen" in Chrome menu');
            } else {
                showToast('For iOS: Use Safari → Share → Add to Home Screen');
            }
        }

        // ===== SHOW TOAST =====
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ===== PWA INSTALL PROMPT =====
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => {
                document.getElementById('installPrompt').classList.add('show');
            }, 2000);
        });

        function promptInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((result) => {
                    if (result.outcome === 'accepted') {
                        showToast('App installed successfully!');
                    }
                    deferredPrompt = null;
                    document.getElementById('installPrompt').classList.remove('show');
                });
            }
        }

        // ===== SERVICE WORKER =====
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(() => { });
            });
        }

        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            loadProducts();

            const searchBox = document.getElementById('searchBox');
            let debounceTimer;

            searchBox.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    searchProducts(e.target.value);
                }, 300);
            });
        });
    </script>
</body>

</html>
